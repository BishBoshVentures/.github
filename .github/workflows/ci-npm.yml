name: CI (npm)

on:
  workflow_call:

jobs:
  ci:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck --if-present || npm run check --if-present || echo "No typecheck script, skipping"

      - name: Lint
        run: npm run lint --if-present || echo "No lint script, skipping"
        continue-on-error: true

      - name: Build
        run: npm run build
